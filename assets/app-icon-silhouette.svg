<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Square background, perfect for Electron icons or CSS border-radius clipping -->
  <rect width="512" height="512" fill="#31363F" />
  
  <!-- Cat Silhouette -->
  <!-- Scaled down to 0.85, centered, and moved up to perfectly fit inside an inscribed circle without clipping the ears or tail -->
  <g fill="#EEEEEE" transform="translate(38.4, 20) scale(0.85)">
    <!-- Curled Tail on the right (tucked in slightly) -->
    <path d="
      M 370 480
      C 450 480, 480 380, 430 310
      C 410 280, 370 290, 370 320
      C 370 340, 400 340, 410 360
      C 430 400, 410 440, 350 440
      Z" />

    <!-- Shoulders / Neck emerging from the bottom (extended downwards so it doesn't float when moved up) -->
    <path d="M 120 600 C 140 420, 180 320, 256 320 C 332 320, 372 420, 392 600 Z" />
    
    <!-- Perfectly symmetric Cat Head -->
    <path d="
      M 256 120
      C 320 120, 360 140, 390 190
      C 420 220, 420 260, 390 300
      C 350 330, 300 340, 256 340
      C 212 340, 162 330, 122 300
      C 92 260, 92 220, 122 190
      C 152 140, 192 120, 256 120
      Z" />
      
    <!-- Left Ear -->
    <path d="M 130 170 Q 90 90 100 60 Q 160 70 200 125 Z" />
    
    <!-- Right Ear -->
    <path d="M 382 170 Q 422 90 412 60 Q 352 70 312 125 Z" />
  </g>
</svg>