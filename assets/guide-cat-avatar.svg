<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="60" cy="60" r="60" />
    </clipPath>
  </defs>
  
  <g clip-path="url(#circle-clip)">
    <!-- Background -->
    <rect width="120" height="120" fill="#8B7E74" />
    
    <!-- Ears -->
    <polygon points="25,25 45,50 25,60" fill="#F2994A" />
    <polygon points="95,25 75,50 95,60" fill="#F2994A" />
    <polygon points="28,32 40,50 30,55" fill="#FDE1D3" />
    <polygon points="92,32 80,50 90,55" fill="#FDE1D3" />
    
    <!-- Head -->
    <ellipse cx="60" cy="65" rx="45" ry="35" fill="#F2994A" />
    
    <!-- Face marking (white area) -->
    <path d="M 60,65 Q 20,65 25,85 Q 60,110 95,85 Q 100,65 60,65 Z" fill="#FFFFFF" />
    
    <!-- Eyes -->
    <circle cx="42" cy="60" r="6" fill="#333333" />
    <circle cx="78" cy="60" r="6" fill="#333333" />
    <!-- Catchlights -->
    <circle cx="44" cy="58" r="2" fill="#FFFFFF" />
    <circle cx="80" cy="58" r="2" fill="#FFFFFF" />
    
    <!-- Nose -->
    <polygon points="56,72 64,72 60,77" fill="#EB5757" />
    
    <!-- Mouth -->
    <path d="M 52,80 Q 60,85 68,80" fill="none" stroke="#333333" stroke-width="2" stroke-linecap="round" />
    
    <!-- Whiskers -->
    <line x1="15" y1="65" x2="30" y2="68" stroke="#333333" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
    <line x1="12" y1="72" x2="28" y2="72" stroke="#333333" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
    <line x1="105" y1="65" x2="90" y2="68" stroke="#333333" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
    <line x1="108" y1="72" x2="92" y2="72" stroke="#333333" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
    
    <!-- Guide Scarf/Bandana -->
    <path d="M 20,85 Q 60,105 100,85 L 110,120 L 10,120 Z" fill="#2D9CDB" />
    <path d="M 60,100 L 75,120 L 45,120 Z" fill="#2285C2" />
    <circle cx="60" cy="95" r="7" fill="#F2C94C" />
  </g>
</svg>
