name: cats-platform npm publish

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: 'npm dist-tag to publish under'
        required: true
        default: next
        type: choice
        options:
          - next
          - latest

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      # npm trusted publishing (OIDC) requires npm 11.5.1+.
      - name: Update npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Install mobile dependencies
        run: npm ci --prefix mobile

      - name: Run test gate
        run: npm test

      # prepack runs npm run build, so publish ships fresh artifacts.
      - name: Publish package
        run: npm publish --tag "${{ inputs.dist_tag }}"
