services:
  cats:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      CATS_HOST: 0.0.0.0
      CATS_PORT: 8181
      CATS_RUNTIME_BASE_URL: ${CATS_RUNTIME_BASE_URL:-http://host.docker.internal:3110}
      CATS_RUNTIME_API_KEY: ${CATS_RUNTIME_API_KEY:-}
    ports:
      - "8181:8181"
    restart: unless-stopped
